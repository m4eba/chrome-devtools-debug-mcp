name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC): npm exchanges this token
      # for a short-lived credential — no stored NPM_TOKEN that can expire.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Node 20 ships npm 10.x, which predates OIDC trusted publishing.
      # Trusted publishing needs npm >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      # No NODE_AUTH_TOKEN: auth comes from the OIDC trusted-publisher config
      # registered for this package (org/repo + this workflow filename) on
      # npmjs.com. Provenance is generated automatically.
      - name: Publish
        run: npm publish --access public
