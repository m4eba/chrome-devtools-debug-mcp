name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Full suite, including browser integration tests. ubuntu-latest ships
      # google-chrome-stable, which findChrome() picks up.
      - name: Run tests
        run: npm test
